name: axiom-document-processing
version: 0.1.0
language: python
description: Document processing nodes for parsing PDFs and splitting text into overlapping chunks.
author: Axiom
license: MIT
nodes:
    - name: PDFParser
      input: PDFInput
      output: DocumentText
      description: Extracts all plain text from a PDF document provided as raw bytes.
    - name: TextChunker
      input: ChunkRequest
      output: ChunkedDocument
      description: Splits a text string into overlapping fixed-size chunks suitable for embedding.
