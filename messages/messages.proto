syntax = "proto3";

package axiom_document_processing;

// A PDF document to be parsed.
message PDFInput {
  // The raw PDF file bytes.
  bytes pdf_bytes = 1;
  // The original filename, used for provenance tracking.
  string filename = 2;
}

// Plain text extracted from a parsed document.
message DocumentText {
  // The full extracted text.
  string text = 1;
  // The original filename.
  string filename = 2;
  // The number of pages in the source document.
  int32 page_count = 3;
}

// A request to split text into overlapping chunks.
message ChunkRequest {
  // The text to split.
  string text = 1;
  // The maximum number of characters per chunk. Defaults to 1000 when absent.
  optional int32 chunk_size = 2;
  // The number of characters to overlap between consecutive chunks. Defaults to 200 when absent.
  optional int32 overlap = 3;
  // Source filename for provenance tracking. Not required for chunking.
  optional string source_filename = 4;
}

// A document split into overlapping text chunks.
message ChunkedDocument {
  // The individual text chunks.
  repeated string chunks = 1;
  // The source filename these chunks came from.
  string source_filename = 2;
}

// A single text chunk emitted by the TextChunker pipeline node.
message ChunkItem {
  // The chunk text.
  string text = 1;
  // The source filename this chunk came from.
  string source_filename = 2;
  // Zero-based index of this chunk within the document.
  int32 chunk_index = 3;
  // Total number of chunks the document was split into.
  int32 total_chunks = 4;
}
